<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Halftone Dot Renderer - WebGL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a1a;
  color: #a1a1aa;
  font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ===== Top Navigation ===== */
.top-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 48px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.nav-brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: #e8e0d4;
  letter-spacing: -0.01em;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 24px;
}
.nav-links a {
  color: #71717a;
  text-decoration: none;
  font-size: 13px;
  font-weight: 400;
  transition: color 0.2s;
}
.nav-links a:hover { color: #e8e0d4; }

/* ===== Main Layout ===== */
.main-content {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ===== Canvas Area ===== */
.canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.canvas-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
canvas#glCanvas {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.hint {
  color: #52525b;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 500;
  position: absolute;
  letter-spacing: 0.08em;
  z-index: 2;
  text-align: center;
  line-height: 2;
}

/* Default image thumbnails */
.default-images {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 3;
}
.default-thumb {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.1);
  transition: border-color 0.2s, transform 0.2s;
  flex-shrink: 0;
}
.default-thumb:hover {
  border-color: #d4a574;
  transform: scale(1.06);
}
.default-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}

/* ===== Right Panel ===== */
.panel {
  width: 280px;
  min-width: 280px;
  border-left: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 16px;
  gap: 4px;
  background: #1a1a1a;
}
.panel::-webkit-scrollbar { width: 5px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: rgba(212,165,116,0.2); border-radius: 10px; }
.panel::-webkit-scrollbar-thumb:hover { background: rgba(212,165,116,0.4); }

/* Section titles */
.panel-title {
  font-size: 10px;
  font-weight: 600;
  color: #71717a;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin: 16px 0 10px;
  padding: 0 2px;
}
.panel-title:first-child { margin-top: 0; }

/* Control rows */
.panel .row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 4px 0;
  transition: all 0.2s ease;
}
.panel .row label {
  font-size: 12px;
  font-weight: 400;
  color: #71717a;
  white-space: nowrap;
  min-width: 72px;
  transition: color 0.2s;
}
.panel .row:hover label { color: #a1a1aa; }

/* Sliders */
.panel .row input[type="range"] {
  flex: 1;
  min-width: 0;
  -webkit-appearance: none;
  appearance: none;
  height: 2px;
  background: rgba(212,165,116,0.2);
  border-radius: 10px;
  outline: none;
  cursor: pointer;
}
.panel .row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #d4a574;
  border: 2px solid #1a1a1a;
  box-shadow: 0 0 0 1px rgba(212,165,116,0.3);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.2s;
}
.panel .row input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
  box-shadow: 0 0 0 1px rgba(212,165,116,0.5), 0 2px 12px rgba(212,165,116,0.3);
}
.panel .row .val {
  font-size: 11px;
  font-weight: 500;
  color: #71717a;
  min-width: 24px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Buttons - pill style */
.btn {
  padding: 7px 14px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: #a1a1aa;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 400;
  font-family: inherit;
  transition: all 0.2s ease;
  text-align: center;
  white-space: nowrap;
}
.btn:hover {
  border-color: rgba(255,255,255,0.2);
  color: #e8e0d4;
}
.btn:active { transform: scale(0.97); }
.btn.active {
  background: rgba(212,165,116,0.08);
  border-color: rgba(212,165,116,0.3);
  color: #d4a574;
}

/* Button group */
.btn-group {
  display: flex;
  gap: 6px;
}
.btn-group .btn { flex: 1; }
.mode-switch {
  gap: 32px;
  margin-bottom: 8px;
}
.mode-switch .btn {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 7px 0 10px;
  border: 0;
  background: transparent;
  border-radius: 0;
  text-decoration: none;
}
.mode-switch .btn:hover {
  border-color: transparent;
}
.mode-switch .btn.active {
  background: transparent;
  border-color: transparent;
  color: #e8e0d4;
}
.mode-switch .btn.active::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: 2px;
  width: 34px;
  height: 2px;
  border-radius: 2px;
  background: #d4a574;
  transform: translateX(-50%);
}

/* Divider */
.divider {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 12px 0;
}

/* Action buttons */
.action-btn {
  display: block;
  width: 100%;
  padding: 10px 16px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #a1a1aa;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 400;
  font-family: inherit;
  text-align: left;
  transition: all 0.2s;
  margin-top: 4px;
}
.action-btn:hover {
  border-color: rgba(255,255,255,0.18);
  color: #e8e0d4;
}
.action-btn.recording {
  border-color: rgba(248,113,113,0.3);
  color: #f87171;
}

/* Color swatch */
.color-swatch {
  width: 28px;
  height: 28px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  cursor: pointer;
  padding: 0;
  overflow: hidden;
  transition: all 0.2s;
}
.color-swatch:hover { border-color: rgba(212,165,116,0.3); }
.color-swatch::-webkit-color-swatch-wrapper { padding: 0; }
.color-swatch::-webkit-color-swatch { border: none; border-radius: 7px; }

/* Export */
.export-formats { display: flex; flex-direction: column; gap: 2px; }
.export-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.export-option:hover { background: rgba(255,255,255,0.02); }
.export-option input[type="radio"] { display: none; }
.export-radio {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1.5px solid #3f3f46;
  transition: all 0.2s;
  position: relative;
  flex-shrink: 0;
}
.export-option input[type="radio"]:checked ~ .export-radio {
  border-color: #d4a574;
}
.export-option input[type="radio"]:checked ~ .export-radio::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #d4a574;
}
.export-option input[type="radio"]:checked ~ .export-label { color: #e8e0d4; }
.export-label { font-size: 12px; font-weight: 400; color: #71717a; transition: color 0.2s; }
.export-badge {
  font-size: 9px;
  font-weight: 500;
  color: #d4a574;
  background: rgba(212,165,116,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: auto;
  border: 1px solid rgba(212,165,116,0.15);
}
.export-progress {
  height: 2px;
  background: rgba(212,165,116,0.1);
  border-radius: 10px;
  margin-top: 8px;
  overflow: hidden;
}
.export-progress-bar {
  height: 100%;
  width: 0%;
  background: #d4a574;
  border-radius: 10px;
  transition: width 0.15s;
}

video { display: none; }

/* Dot shape selector */
.shape-group {
  display: flex;
  gap: 4px;
}
.shape-btn {
  flex: 1;
  padding: 6px 0;
  border: 1px solid rgba(255,255,255,0.08);
  background: transparent;
  color: #52525b;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  font-weight: 400;
  transition: all 0.2s;
  text-align: center;
}
.shape-btn:hover { color: #71717a; }
.shape-btn.active {
  border-color: rgba(212,165,116,0.3);
  color: #d4a574;
}

/* Language toggle */
.lang-toggle {
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: transparent;
  color: #71717a;
  border-radius: 14px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  transition: all 0.2s ease;
  margin-left: 16px;
}
.lang-toggle:hover {
  border-color: rgba(255,255,255,0.2);
  color: #e8e0d4;
}
</style>
</head>

<!-- Top Navigation -->
<nav class="top-nav">
  <div class="nav-brand">Shader</div>
  <div class="nav-links">
    <a href="https://github.com/chelowang/Shader" target="_blank">GitHub</a>
    <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>

</nav>

<!-- Main Content -->
<div class="main-content">

      <p class="hint" id="hint" data-i18n="hint">Import an image or video to start</p>

        <div class="default-thumb" data-src="default2.jpg"><img src="default2.jpg" draggable="false"></div>

<script>
// ============ Fullscreen ============
document.getElementById('btnFullscreen').onclick = () => {
  const wrapper = document.querySelector('.canvas-wrapper');
  if (wrapper.requestFullscreen) wrapper.requestFullscreen();
  else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
};

// ============ WebGL ============
const canvas = document.getElementById('glCanvas');
const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
if (!gl) alert('WebGL not available');

const VS = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  v_uv.y = 1.0 - v_uv.y;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const FS = `
precision highp float;
varying vec2 v_uv;

uniform sampler2D u_image;
uniform vec2 u_resolution;
uniform float u_dotSize;
uniform float u_dotSpacing;
uniform float u_dotSoftness;
uniform float u_minDot;
uniform float u_maxDot;
uniform float u_shape;       // 0=circle, 1=square, 2=diamond
uniform float u_gridRotation;
uniform float u_contrast;
uniform float u_gamma;
uniform float u_threshold;
uniform float u_invert;
uniform vec3 u_bgColor;
uniform vec3 u_dotColor;
uniform float u_colorFromImage;
uniform float u_colorMix;
uniform float u_time;

// Post-processing
uniform float u_pp_vignette;
uniform float u_pp_scanlines;
uniform float u_pp_noise;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

void main() {
  vec2 pixelCoord = gl_FragCoord.xy;
  float cellSize = u_dotSize + u_dotSpacing;

  // Grid rotation
  float angle = u_gridRotation;
  vec2 center = u_resolution * 0.5;
  float cosA = cos(angle);
  float sinA = sin(angle);
  vec2 rotated = vec2(
    cosA * (pixelCoord.x - center.x) + sinA * (pixelCoord.y - center.y),
    -sinA * (pixelCoord.x - center.x) + cosA * (pixelCoord.y - center.y)
  ) + center;

  // Cell coordinates
  vec2 cell = floor(rotated / cellSize);
  vec2 cellCenter = (cell + 0.5) * cellSize;

  // Unrotate cell center back to image space
  vec2 unrotCenter = vec2(
    cosA * (cellCenter.x - center.x) - sinA * (cellCenter.y - center.y),
    sinA * (cellCenter.x - center.x) + cosA * (cellCenter.y - center.y)
  ) + center;

  vec2 sampleUV = unrotCenter / u_resolution;
  sampleUV.y = 1.0 - sampleUV.y;

  // Clamp UV
  if (sampleUV.x < 0.0 || sampleUV.x > 1.0 || sampleUV.y < 0.0 || sampleUV.y > 1.0) {
    gl_FragColor = vec4(u_bgColor, 1.0);
    return;
  }

  vec3 texColor = texture2D(u_image, sampleUV).rgb;
  float brightness = dot(texColor, vec3(0.299, 0.587, 0.114));

  // Apply contrast
  brightness = clamp((brightness - 0.5) * u_contrast + 0.5, 0.0, 1.0);

  // Apply gamma
  brightness = pow(brightness, u_gamma);

  // Apply threshold
  brightness = smoothstep(u_threshold, u_threshold + 0.01, brightness) * brightness;

  // Apply invert
  brightness = mix(brightness, 1.0 - brightness, u_invert);

  // Map brightness to dot radius
  float dotRadius = mix(u_minDot, u_maxDot, brightness) * u_dotSize * 0.5;

  // Local position within cell
  vec2 localPos = rotated - cellCenter;

  // Distance based on shape
  float dist;
  if (u_shape < 0.5) {
    // Circle
    dist = length(localPos);
  } else if (u_shape < 1.5) {
    // Square
    dist = max(abs(localPos.x), abs(localPos.y));
  } else {
    // Diamond
    dist = abs(localPos.x) + abs(localPos.y);
    dotRadius *= 1.414;
  }

  // Softness
  float edge = u_dotSoftness * u_dotSize * 0.1;
  float alpha = 1.0 - smoothstep(dotRadius - edge, dotRadius + edge, dist);

  // Determine dot color
  vec3 finalDotColor = u_dotColor;
  if (u_colorFromImage > 0.5) {
    finalDotColor = mix(u_dotColor, texColor, u_colorMix);
  }

  // Compose
  vec3 color = mix(u_bgColor, finalDotColor, alpha);

  // Post-processing
  vec2 suv = gl_FragCoord.xy / u_resolution;

  if (u_pp_vignette > 0.001) {
    vec2 vc = suv - 0.5;
    color *= clamp(1.0 - dot(vc, vc) * u_pp_vignette * 3.5, 0.0, 1.0);
  }

  if (u_pp_scanlines > 0.001) {
    float sl = sin(suv.y * u_resolution.y * 3.14159) * 0.5 + 0.5;
    color *= 1.0 - u_pp_scanlines * 0.45 * (1.0 - sl);
  }

  if (u_pp_noise > 0.001) {
    float n = (hash(suv * u_resolution + fract(u_time * 43.7)) - 0.5) * u_pp_noise;
    color = clamp(color + n, 0.0, 1.0);
  }

  gl_FragColor = vec4(color, 1.0);
}`;

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));

}
const prog = gl.createProgram();
gl.attachShader(prog, compileShader(VS, gl.VERTEX_SHADER));
gl.attachShader(prog, compileShader(FS, gl.FRAGMENT_SHADER));
gl.linkProgram(prog); gl.useProgram(prog);

gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const loc = {};
['u_image','u_resolution','u_dotSize','u_dotSpacing','u_dotSoftness',
 'u_minDot','u_maxDot','u_shape','u_gridRotation',
 'u_contrast','u_gamma','u_threshold','u_invert',
 'u_bgColor','u_dotColor','u_colorFromImage','u_colorMix','u_time',
 'u_pp_vignette','u_pp_scanlines','u_pp_noise'

function createTexture(unit, filter) {
  const tex = gl.createTexture();
  gl.activeTexture(gl.TEXTURE0 + unit);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter || gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter || gl.LINEAR);
  return tex;
}
const texImage = createTexture(0, gl.LINEAR);
gl.uniform1i(loc.u_image, 0);

// ============ State ============
let source = null, animId = null, currentImgSrc = null;
const params = {
  dotSize: 8, dotSpacing: 2, dotSoftness: 0.05,
  minDot: 0.05, maxDot: 0.95,
  shape: 0, gridRotation: 0,
  contrast: 1.0, gamma: 1.0, threshold: 0.0, invert: 0,
  bgColor: [0, 0, 1], dotColor: [1, 1, 1],
  colorFromImage: 0, colorMix: 1.0,
  pp_vignette: 0, pp_scanlines: 0, pp_noise: 0,
};

let startTime = performance.now();
function render() {
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform2f(loc.u_resolution, canvas.width, canvas.height);
  gl.uniform1f(loc.u_dotSize, params.dotSize);
  gl.uniform1f(loc.u_dotSpacing, params.dotSpacing);
  gl.uniform1f(loc.u_dotSoftness, params.dotSoftness);
  gl.uniform1f(loc.u_minDot, params.minDot);
  gl.uniform1f(loc.u_maxDot, params.maxDot);
  gl.uniform1f(loc.u_shape, params.shape);
  gl.uniform1f(loc.u_gridRotation, params.gridRotation * Math.PI / 180);
  gl.uniform1f(loc.u_contrast, params.contrast);
  gl.uniform1f(loc.u_gamma, params.gamma);
  gl.uniform1f(loc.u_threshold, params.threshold);
  gl.uniform1f(loc.u_invert, params.invert);
  gl.uniform3f(loc.u_bgColor, params.bgColor[0], params.bgColor[1], params.bgColor[2]);
  gl.uniform3f(loc.u_dotColor, params.dotColor[0], params.dotColor[1], params.dotColor[2]);
  gl.uniform1f(loc.u_colorFromImage, params.colorFromImage);
  gl.uniform1f(loc.u_colorMix, params.colorMix);
  gl.uniform1f(loc.u_time, (performance.now() - startTime) / 1000);
  gl.uniform1f(loc.u_pp_vignette, params.pp_vignette);

function uploadAndRender(src) {

document.getElementById('btnVideo').onclick = () => fileVideo.click();

  if (animId) { cancelAnimationFrame(animId); animId = null; }
  video.pause(); video.src = '';
}

fileVideo.addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;

  animId = requestAnimationFrame(videoLoop);
}

function saveImageToStorage(imgEl) {
  try {
    const c = document.createElement('canvas');
    c.width = imgEl.naturalWidth || imgEl.width;
    c.height = imgEl.naturalHeight || imgEl.height;
    c.getContext('2d').drawImage(imgEl, 0, 0);
    localStorage.setItem('shader_shared_image', c.toDataURL('image/png'));
  } catch(e) {}
}
function loadImageFile(file) {
  stopVideo();
  const img = new Image();
  img.onload = () => {
    source = 'image'; currentImgSrc = img;
    canvas.width = img.width; canvas.height = img.height;
    document.getElementById('hint').style.display = 'none';
    document.getElementById('exportSection').style.display = '';
    document.getElementById('btnExport').style.display = '';
    uploadAndRender(img);
    saveImageToStorage(img);
  };
  img.src = URL.createObjectURL(file);
}

function loadVideoFile(file) {
  stopVideo(); source = 'video';
  video.src = URL.createObjectURL(file);
  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    document.getElementById('hint').style.display = 'none';
    document.getElementById('exportSection').style.display = '';

  };
}

  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const file = item.getAsFile();
      if (file) { loadImageFile(file); break; }
    }
  }
});

document.querySelectorAll('input[name="exportFmt"]').forEach(r => {

function download(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);

btnExport.onclick = () => {
  const fmt = document.querySelector('input[name="exportFmt"]:checked').value;

  if (fmt === 'png' || fmt === 'jpg') {
    const mime = fmt === 'png' ? 'image/png' : 'image/jpeg';
    if (source === 'video') uploadAndRender(video);
    else if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
    if (exportScale === 1) {
      canvas.toBlob(blob => download(blob, `halftone_render.${fmt}`), mime, 0.95);
    } else {
      const offscreen = document.createElement('canvas');
      offscreen.width = canvas.width * exportScale;
      offscreen.height = canvas.height * exportScale;
      const ctx = offscreen.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(canvas, 0, 0, offscreen.width, offscreen.height);
      offscreen.toBlob(blob => download(blob, `halftone_render_${exportScale}x.${fmt}`), mime, 0.95);
    }
    return;
  }

  if (isExporting) { stopExport(); return; }

  const duration = Number(document.getElementById('recordDuration').value);
  isExporting = true;
  btnExport.dataset.i18n = 'stopRecording';
  btnExport.textContent = t('stopRecording');
  btnExport.classList.add('recording');
  exportProgress.style.display = '';
  exportProgressBar.style.width = '0%';

  if (fmt === 'mp4') {
    const stream = canvas.captureStream(30);
    const mimeType = MediaRecorder.isTypeSupported('video/mp4;codecs=avc1')
      ? 'video/mp4;codecs=avc1'
      : MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
        ? 'video/webm;codecs=vp9' : 'video/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8000000 });
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
      download(new Blob(recordedChunks, { type: mimeType }), `halftone_render.${ext}`);
      resetExportUI();
    };
    mediaRecorder.start();
    animateProgress(duration, () => { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); });
  } else if (fmt === 'gif') {
    const fps = 15;
    const totalFrames = duration * fps;
    const interval = 1000 / fps;
    const frames = [];
    let frameCnt = 0;
    function captureFrame() {
      if (!isExporting || frameCnt >= totalFrames) {
        encodeGIF(frames, canvas.width, canvas.height, interval, fps);
        return;
      }
      if (source === 'video') uploadAndRender(video);
      else if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
      const pixels = new Uint8Array(canvas.width * canvas.height * 4);
      gl.readPixels(0, 0, canvas.width, canvas.height, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
      frames.push(pixels);
      frameCnt++;
      exportProgressBar.style.width = (frameCnt / totalFrames * 50) + '%';
      setTimeout(captureFrame, interval);
    }
    captureFrame();
  }
};

function stopExport() {
  isExporting = false;
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  else resetExportUI();
}

function resetExportUI() {
  isExporting = false;
  btnExport.dataset.i18n = 'download';
  btnExport.textContent = t('download');
  btnExport.classList.remove('recording');
  exportProgress.style.display = 'none';
}

function animateProgress(duration, onDone) {
  const start = performance.now();
  function tick() {
    if (!isExporting) return;
    const p = Math.min((performance.now() - start) / (duration * 1000), 1);
    exportProgressBar.style.width = (p * 100) + '%';
    if (p < 1) requestAnimationFrame(tick);
    else onDone();
  }
  requestAnimationFrame(tick);
}

// ============ GIF Encoder ============
function encodeGIF(frames, w, h, delay, fps) {
  const maxDim = 480;
  let sw = w, sh = h;
  if (w > maxDim || h > maxDim) {
    const ratio = Math.min(maxDim / w, maxDim / h);
    sw = Math.round(w * ratio);
    sh = Math.round(h * ratio);
  }
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = sw; tempCanvas.height = sh;
  const tctx = tempCanvas.getContext('2d');
  const srcCanvas = document.createElement('canvas');
  srcCanvas.width = w; srcCanvas.height = h;
  const sctx = srcCanvas.getContext('2d');

  const out = [];
  function writeStr(s) { for (let i = 0; i < s.length; i++) out.push(s.charCodeAt(i)); }
  function writeU16(v) { out.push(v & 0xff, (v >> 8) & 0xff); }

  writeStr('GIF89a');
  writeU16(sw); writeU16(sh);
  out.push(0x70, 0, 0);
  out.push(0x21, 0xff, 0x0b);
  writeStr('NETSCAPE2.0');
  out.push(3, 1); writeU16(0); out.push(0);
  const delayCs = Math.round(1000 / fps / 10);

  for (let f = 0; f < frames.length; f++) {
    exportProgressBar.style.width = (50 + f / frames.length * 50) + '%';
    const imgData = sctx.createImageData(w, h);
    const src = frames[f];
    for (let y = 0; y < h; y++) {
      const srcRow = (h - 1 - y) * w * 4;
      const dstRow = y * w * 4;
      for (let x = 0; x < w * 4; x++) imgData.data[dstRow + x] = src[srcRow + x];
    }
    sctx.putImageData(imgData, 0, 0);
    tctx.drawImage(srcCanvas, 0, 0, sw, sh);
    const scaled = tctx.getImageData(0, 0, sw, sh).data;

    const palette = [];
    const colorMap = new Map();
    const indexed = new Uint8Array(sw * sh);

    for (let i = 0; i < sw * sh; i++) {
      const r = scaled[i*4] >> 2, g = scaled[i*4+1] >> 2, b = scaled[i*4+2] >> 2;
      const key = (r << 12) | (g << 6) | b;
      if (!colorMap.has(key) && palette.length < 256) {
        colorMap.set(key, palette.length);
        palette.push([scaled[i*4], scaled[i*4+1], scaled[i*4+2]]);
      }
      if (colorMap.has(key)) {
        indexed[i] = colorMap.get(key);
      } else {
        let best = 0, bestD = Infinity;
        const sr = scaled[i*4], sg = scaled[i*4+1], sb = scaled[i*4+2];
        for (let j = 0; j < palette.length; j++) {
          const dr = sr - palette[j][0], dg = sg - palette[j][1], db = sb - palette[j][2];
          const d = dr*dr + dg*dg + db*db;
          if (d < bestD) { bestD = d; best = j; }
        }
        indexed[i] = best;
      }
    }

    let palSize = 2;
    while (palSize < palette.length) palSize *= 2;
    while (palette.length < palSize) palette.push([0,0,0]);
    const bits = Math.log2(palSize);

    out.push(0x21, 0xf9, 4, 0);
    writeU16(delayCs);
    out.push(0, 0);
    out.push(0x2c);
    writeU16(0); writeU16(0); writeU16(sw); writeU16(sh);
    out.push(0x80 | (bits - 1));
    for (let c = 0; c < palSize; c++) {
      out.push(palette[c][0], palette[c][1], palette[c][2]);
    }
    const minCode = Math.max(bits, 2);
    lzwEncode(out, indexed, minCode);
  }

  out.push(0x3b);
  resetExportUI();
  download(new Blob([new Uint8Array(out)], { type: 'image/gif' }), 'halftone_render.gif');
}

function lzwEncode(out, data, minCode) {
  const clearCode = 1 << minCode;
  const eoiCode = clearCode + 1;
  let codeSize = minCode + 1;
  let nextCode = eoiCode + 1;
  const table = new Map();
  const buffer = [];
  let bits = 0, buf = 0;

  function emit(code) {
    buf |= code << bits;
    bits += codeSize;
    while (bits >= 8) { buffer.push(buf & 0xff); buf >>= 8; bits -= 8; }
  }
  function initTable() {
    table.clear();
    for (let i = 0; i < clearCode; i++) table.set(String(i), i);
    nextCode = eoiCode + 1;
    codeSize = minCode + 1;
  }

  out.push(minCode);
  initTable();
  emit(clearCode);
  let prefix = String(data[0]);
  for (let i = 1; i < data.length; i++) {
    const c = String(data[i]);
    const key = prefix + ',' + c;
    if (table.has(key)) {
      prefix = key;
    } else {
      emit(table.get(prefix));
      if (nextCode < 4096) {
        table.set(key, nextCode++);
        if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
      } else {
        emit(clearCode);
        initTable();
      }
      prefix = c;
    }
  }
  emit(table.get(prefix));
  emit(eoiCode);
  if (bits > 0) buffer.push(buf & 0xff);
  let pos = 0;
  while (pos < buffer.length) {
    const chunk = Math.min(255, buffer.length - pos);
    out.push(chunk);
    for (let i = 0; i < chunk; i++) out.push(buffer[pos++]);
  }
  out.push(0);
}

let currentLang = 'zh';

function t(key) {
  return i18n[currentLang][key] || i18n.en[key] || key;
}

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (key === 'fullscreen') {
      el.innerHTML = t(key);
    } else {
      el.textContent = t(key);
    }
  });
  document.getElementById('langToggle').textContent = currentLang === 'en' ? '中文' : 'EN';
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'zh' : 'en';
  applyLang();
}

applyLang();
