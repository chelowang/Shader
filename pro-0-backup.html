<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ASCII 渲染器 - WebGL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #09090b;
  color: #a1a1aa;
  font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* 滚动条 */
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }
.panel::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

/* 左侧控制面板 */
.panel {
  width: 272px;
  min-width: 272px;
  background: #0c0c0f;
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 20px 16px;
  gap: 4px;
}
.panel-title {
  font-size: 11px;
  font-weight: 600;
  color: #52525b;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 20px 0 8px;
  padding: 0 2px;
}
.panel-title:first-child { margin-top: 0; }
.panel .row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 5px 2px;
  border-radius: 6px;
  transition: background 0.15s;
}
.panel .row:hover {
  background: rgba(255,255,255,0.02);
}
.panel .row label {
  font-size: 12px;
  font-weight: 400;
  color: #71717a;
  white-space: nowrap;
  min-width: 72px;
}
.panel .row input[type="range"] {
  flex: 1;
  min-width: 0;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: #27272a;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
.panel .row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #e4e4e7;
  border: 2px solid #18181b;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.5);
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s;
}
.panel .row input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.15);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.2), 0 2px 12px rgba(0,0,0,0.6);
}
.panel .row input[type="range"]:active::-webkit-slider-thumb {
  transform: scale(0.95);
  background: #fff;
}
.panel .row .val {
  font-size: 11px;
  font-weight: 500;
  color: #52525b;
  min-width: 26px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.btn {
  padding: 8px 0;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: #d4d4d8;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  transition: all 0.2s ease;
  text-align: center;
  width: 100%;
  letter-spacing: 0.01em;
  backdrop-filter: blur(4px);
}
.btn:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.12);
  color: #fafafa;
}
.btn:active {
  transform: scale(0.98);
}
.btn-group {
  display: flex;
  gap: 6px;
}
.btn-group .btn { flex: 1; }

.btn.active {
  background: rgba(74, 222, 128, 0.08);
  border-color: rgba(74, 222, 128, 0.25);
  color: #4ade80;
}
.btn.active:hover {
  background: rgba(74, 222, 128, 0.12);
}
.btn.recording {
  background: rgba(248, 113, 113, 0.08);
  border-color: rgba(248, 113, 113, 0.25);
  color: #f87171;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  margin: 12px 0;
}

/* 自定义字符输入 */
.char-input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  color: #e4e4e7;
  font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
  font-size: 13px;
  padding: 8px 10px;
  border-radius: 8px;
  letter-spacing: 3px;
  transition: all 0.2s;
}
.char-input:focus {
  outline: none;
  border-color: rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.03);
}
.char-hint {
  font-size: 10px;
  color: #3f3f46;
  margin-top: 4px;
  padding: 0 2px;
}

/* 颜色选择器 */
.color-swatch {
  width: 28px;
  height: 28px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  cursor: pointer;
  padding: 0;
  overflow: hidden;
}
.color-swatch::-webkit-color-swatch-wrapper { padding: 0; }
.color-swatch::-webkit-color-swatch { border: none; border-radius: 5px; }

/* 导出格式选择 */
.export-formats {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.export-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.export-option:hover {
  background: rgba(255,255,255,0.03);
}
.export-option input[type="radio"] {
  display: none;
}
.export-radio {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid #3f3f46;
  transition: all 0.2s;
  position: relative;
  flex-shrink: 0;
}
.export-option input[type="radio"]:checked ~ .export-radio {
  border-color: #a78bfa;
}
.export-option input[type="radio"]:checked ~ .export-radio::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #a78bfa;
}
.export-option input[type="radio"]:checked ~ .export-label {
  color: #e4e4e7;
}
.export-label {
  font-size: 12px;
  font-weight: 500;
  color: #71717a;
  transition: color 0.15s;
}
.export-badge {
  font-size: 10px;
  font-weight: 500;
  color: #a78bfa;
  background: rgba(167, 139, 250, 0.1);
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: auto;
}
.export-btn {
  margin-top: 6px;
  background: rgba(167, 139, 250, 0.1);
  border-color: rgba(167, 139, 250, 0.2);
  color: #a78bfa;
}
.export-btn:hover {
  background: rgba(167, 139, 250, 0.15);
  border-color: rgba(167, 139, 250, 0.3);
  color: #c4b5fd;
}
.export-btn.exporting {
  background: rgba(248, 113, 113, 0.1);
  border-color: rgba(248, 113, 113, 0.25);
  color: #f87171;
}
.export-progress {
  height: 3px;
  background: #1c1c1e;
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.export-progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #a78bfa, #c4b5fd);
  border-radius: 2px;
  transition: width 0.15s;
}

/* 右侧画布区 */
.canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #09090b;
  position: relative;
}
canvas#glCanvas {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
.hint {
  color: #3f3f46;
  font-size: 13px;
  font-weight: 400;
  position: absolute;
  letter-spacing: 0.05em;
}
video { display: none; }
</style>
</head>
<body>

<!-- 左侧面板 -->
<div class="panel">
  <div class="panel-title">导入</div>
  <div class="btn-group">
    <button class="btn" id="btnImage">图片</button>
    <button class="btn" id="btnVideo">视频</button>
  </div>

  <div id="exportSection" style="display:none;">
    <div class="divider"></div>
    <div class="panel-title">导出</div>
    <div class="export-formats">
      <label class="export-option">
        <input type="radio" name="exportFmt" value="png" checked>
        <span class="export-radio"></span>
        <span class="export-label">PNG</span>
      </label>
      <label class="export-option">
        <input type="radio" name="exportFmt" value="jpg">
        <span class="export-radio"></span>
        <span class="export-label">JPG</span>
      </label>
      <label class="export-option">
        <input type="radio" name="exportFmt" value="gif">
        <span class="export-radio"></span>
        <span class="export-label">GIF</span>
        <span class="export-badge">Animated</span>
      </label>
      <label class="export-option">
        <input type="radio" name="exportFmt" value="mp4">
        <span class="export-radio"></span>
        <span class="export-label">MP4</span>
        <span class="export-badge">Animation</span>
      </label>
    </div>
    <div id="exportDuration" class="row" style="display:none;margin-top:4px;">
      <label>时长(秒)</label>
      <input type="range" id="recordDuration" min="1" max="30" value="5">
      <span class="val" id="recordDurationVal">5</span>
    </div>
    <button class="btn export-btn" id="btnExport">导出</button>
    <div class="export-progress" id="exportProgress" style="display:none;">
      <div class="export-progress-bar" id="exportProgressBar"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="panel-title">字符</div>
  <input type="text" class="char-input" id="charInput" value=" .:-=+*t2#@" spellcheck="false">
  <div class="char-hint">从暗到亮排列，首位为空格</div>

  <div class="row">
    <label>大小</label>
    <input type="range" id="cellSize" min="4" max="24" value="10">
    <span class="val" id="cellSizeVal">10</span>
  </div>
  <div class="row">
    <label>间距</label>
    <input type="range" id="charSpacing" min="0" max="20" value="4">
    <span class="val" id="charSpacingVal">4</span>
  </div>
  <div class="row">
    <label>密度</label>
    <input type="range" id="density" min="10" max="100" value="70">
    <span class="val" id="densityVal">70</span>
  </div>
  <div class="row">
    <label>不透明度</label>
    <input type="range" id="charOpacity" min="10" max="100" value="80">
    <span class="val" id="charOpacityVal">80</span>
  </div>

  <div class="divider"></div>

  <div class="panel-title">亮度</div>
  <div class="row">
    <label>阈值</label>
    <input type="range" id="threshold" min="0" max="500" value="150" step="1">
    <span class="val" id="thresholdVal">30</span>
  </div>
  <div class="row">
    <label>渐隐</label>
    <input type="range" id="fadeRange" min="1" max="200" value="80" step="1">
    <span class="val" id="fadeRangeVal">40</span>
  </div>
  <div class="row">
    <label>对比度</label>
    <input type="range" id="charGamma" min="10" max="300" value="100">
    <span class="val" id="charGammaVal">100</span>
  </div>
  <div class="row">
    <label>边缘增强</label>
    <input type="range" id="edgeBoost" min="0" max="100" value="30">
    <span class="val" id="edgeBoostVal">30</span>
  </div>

  <div class="divider"></div>

  <div class="panel-title">模式</div>
  <button class="btn" id="btnMono">单色模式</button>
  <div id="monoOptions" style="display:none;">
    <div class="row" style="margin-top:6px;">
      <label>背景色</label>
      <input type="color" id="monoBgColor" value="#1a2744" class="color-swatch">
    </div>
    <div class="row">
      <label>字符色</label>
      <input type="color" id="monoCharColor" value="#ffffff" class="color-swatch">
    </div>
  </div>

  <div class="divider"></div>

  <div class="panel-title">背景</div>
  <div class="row">
    <label>原图亮度</label>
    <input type="range" id="bgDarken" min="0" max="100" value="80">
    <span class="val" id="bgDarkenVal">80</span>
  </div>
  <div class="row">
    <label>模糊</label>
    <input type="range" id="blur" min="0" max="30" value="8">
    <span class="val" id="blurVal">8</span>

  <div class="divider"></div>

  <div class="panel-title">闪烁</div>

      <label>速度</label>
      <input type="range" id="flickerSpeed" min="1" max="100" value="30">
      <span class="val" id="flickerSpeedVal">30</span>
    </div>
    <div class="row">
      <label>强度</label>
      <input type="range" id="flickerIntensity" min="0" max="100" value="50">
      <span class="val" id="flickerIntensityVal">50</span>
    </div>
    <div class="row">
      <label>随机性</label>
      <input type="range" id="flickerRandom" min="0" max="100" value="50">
      <span class="val" id="flickerRandomVal">50</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="panel-title">渐变</div>
  <div class="row">
    <label>波纹强度</label>
    <input type="range" id="waveIntensity" min="0" max="100" value="40">
    <span class="val" id="waveIntensityVal">40</span>
  </div>
  <div class="row">
    <label>波纹缩放</label>
    <input type="range" id="waveScale" min="1" max="100" value="20">
    <span class="val" id="waveScaleVal">20</span>
  </div>
  <div class="row">
    <label>颜色渐变</label>
    <input type="range" id="colorGrad" min="0" max="100" value="50">
    <span class="val" id="colorGradVal">50</span>
  </div>
</div>

<!-- 右侧画布 -->
<div class="canvas-area">
  <canvas id="glCanvas"></canvas>
  <p class="hint" id="hint">导入图片或视频开始</p>
</div>

<input type="file" id="fileImage" accept="image/*" hidden>
<input type="file" id="fileVideo" accept="video/*" hidden>
<video id="video" loop muted playsinline></video>
<canvas id="charCanvas" style="display:none;"></canvas>

<script>
// ============ 字符图集 ============
let asciiChars = ' .:-=+*t2#@';
let charCount = asciiChars.length;

function createCharAtlas(fontSize) {
  const c = document.getElementById('charCanvas');
  const ctx = c.getContext('2d');
  const font = `${fontSize}px Menlo, Monaco, "Courier New", monospace`;
  ctx.font = font;
  const charW = Math.ceil(ctx.measureText('W').width);
  const charH = fontSize;
  c.width = charW * charCount;
  c.height = charH;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, c.width, c.height);
  ctx.font = font;
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'top';
  for (let i = 0; i < charCount; i++) {
    ctx.fillText(asciiChars[i], i * charW, 0);
  }
  return { canvas: c, charW, charH };
}

// ============ WebGL ============
const canvas = document.getElementById('glCanvas');
const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
if (!gl) alert('WebGL 不可用');

const VS = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  v_uv.y = 1.0 - v_uv.y;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const FS = `
precision highp float;
varying vec2 v_uv;

uniform sampler2D u_image;
uniform sampler2D u_charAtlas;
uniform vec2 u_resolution;
uniform vec2 u_cellSize;
uniform float u_charCount;
uniform float u_bgDarken;
uniform float u_threshold;
uniform float u_blur;
uniform float u_waveIntensity;
uniform float u_waveScale;
uniform float u_density;
uniform float u_edgeBoost;
uniform float u_colorGrad;
uniform float u_charOpacity;
uniform float u_fadeRange;
uniform float u_charGamma;
uniform float u_monoMode;       // 0=正常, 1=单色模式
uniform vec3 u_monoBg;           // 单色背景色
uniform vec3 u_monoChar;         // 单色字符色
uniform float u_time;
uniform float u_flickerSpeed;
uniform float u_flickerIntensity;
uniform float u_flickerRandom;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i), b = hash(i + vec2(1,0)), c = hash(i + vec2(0,1)), d = hash(i + vec2(1,1));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
  return v;
}
vec3 blurSample(vec2 uv, float radius) {
  vec3 sum = vec3(0.0); float count = 0.0;
  vec2 texel = 1.0 / u_resolution;
  for (float x = -4.0; x <= 4.0; x += 1.0)
    for (float y = -4.0; y <= 4.0; y += 1.0) {
      sum += texture2D(u_image, uv + vec2(x,y) * texel * radius).rgb;
      count += 1.0;
    }
  return sum / count;
}
float edgeDetect(vec2 uv) {
  vec2 t = 1.0 / u_resolution;
  float tl = dot(texture2D(u_image, uv+vec2(-1, 1)*t).rgb, vec3(.299,.587,.114));
  float tm = dot(texture2D(u_image, uv+vec2( 0, 1)*t).rgb, vec3(.299,.587,.114));
  float tr = dot(texture2D(u_image, uv+vec2( 1, 1)*t).rgb, vec3(.299,.587,.114));
  float ml = dot(texture2D(u_image, uv+vec2(-1, 0)*t).rgb, vec3(.299,.587,.114));
  float mr = dot(texture2D(u_image, uv+vec2( 1, 0)*t).rgb, vec3(.299,.587,.114));
  float bl = dot(texture2D(u_image, uv+vec2(-1,-1)*t).rgb, vec3(.299,.587,.114));
  float bm = dot(texture2D(u_image, uv+vec2( 0,-1)*t).rgb, vec3(.299,.587,.114));
  float br = dot(texture2D(u_image, uv+vec2( 1,-1)*t).rgb, vec3(.299,.587,.114));
  float gx = -tl - 2.0*ml - bl + tr + 2.0*mr + br;
  float gy = -tl - 2.0*tm - tr + bl + 2.0*bm + br;
  return sqrt(gx*gx + gy*gy);
}

void main() {
  vec2 cell = floor(gl_FragCoord.xy / u_cellSize);
  vec2 cellUV = (cell + 0.5) * u_cellSize / u_resolution;
  cellUV.y = 1.0 - cellUV.y;

  vec3 cellColor = texture2D(u_image, cellUV).rgb;
  float brightness = dot(cellColor, vec3(0.299, 0.587, 0.114));

  float edge = edgeDetect(cellUV) * u_edgeBoost * 3.0;
  vec2 wc = cell / u_waveScale;
  float wave = fbm(wc) * 2.0 - 1.0;
  float waveOff = wave * u_waveIntensity;

  float eBri = clamp(brightness + waveOff * 0.3 + edge, 0.0, 1.0);

  // ====== 闪烁效果 ======
  float flickerVal = 1.0;
  if (u_flickerSpeed > 0.001) {
    float cellId = hash(cell * 17.31);
    float phase = cellId * u_flickerRandom * 6.2832;
    float speed = u_flickerSpeed * (0.5 + cellId * u_flickerRandom * 1.5);
    flickerVal = 0.5 + 0.5 * sin(u_time * speed + phase);
    flickerVal = mix(1.0, flickerVal, u_flickerIntensity);
  }

  // ====== 单色模式 ======
  if (u_monoMode > 0.5) {
    vec3 bg = u_monoBg;
    // 所有单元格都显示字符
    float cVal = pow(clamp(eBri + waveOff * 0.2, 0.0, 1.0), u_charGamma);
    float cIdx = floor(cVal * (u_charCount - 1.0) + 0.5);
    vec2 lp = fract(gl_FragCoord.xy / u_cellSize);
    lp.y = 1.0 - lp.y;
    float cAlpha = texture2D(u_charAtlas, vec2((cIdx + lp.x) / u_charCount, lp.y)).r;
    // 字符透明度随亮度变化：亮处字符更明显
    float intensity = cAlpha * (0.3 + eBri * 0.7) * u_charOpacity * flickerVal;
    vec3 result = mix(bg, u_monoChar, clamp(intensity, 0.0, 1.0));
    gl_FragColor = vec4(result, 1.0);
    return;
  }

  // ====== 正常模式 ======
  vec3 orig = texture2D(u_image, v_uv).rgb;
  vec3 blurred = blurSample(v_uv, u_blur);
  vec3 bg = mix(orig, blurred, min(u_blur / 10.0, 1.0)) * u_bgDarken;

  bool showChar = hash(cell) < u_density;
  float fade = smoothstep(u_threshold, u_threshold + u_fadeRange, eBri);
  if (fade < 0.01 || !showChar) { gl_FragColor = vec4(bg, 1.0); return; }

  float cVal = clamp(eBri + waveOff * 0.2, 0.0, 1.0);
  cVal = pow(cVal, u_charGamma);
  float cIdx = floor(cVal * (u_charCount - 1.0) + 0.5);
  vec2 lp = fract(gl_FragCoord.xy / u_cellSize);
  lp.y = 1.0 - lp.y;
  float cAlpha = texture2D(u_charAtlas, vec2((cIdx + lp.x) / u_charCount, lp.y)).r;

  vec3 cc = mix(vec3(1.0), cellColor / max(dot(cellColor, vec3(.299,.587,.114)), 0.01) * 0.7, u_colorGrad * 0.5);
  cc = clamp(cc, 0.0, 1.0);
  float hs = wave * u_colorGrad * 0.15;
  float cosH = cos(hs * 3.14159), sinH = sin(hs * 3.14159);
  vec3 sh = vec3(
    cc.r*(.667+cosH*.333)+cc.g*(.333-cosH*.333-sinH*.577)+cc.b*(.333-cosH*.333+sinH*.577),
    cc.r*(.333-cosH*.333+sinH*.577)+cc.g*(.667+cosH*.333)+cc.b*(.333-cosH*.333-sinH*.577),
    cc.r*(.333-cosH*.333-sinH*.577)+cc.g*(.333-cosH*.333+sinH*.577)+cc.b*(.667+cosH*.333)
  );
  vec3 fcc = clamp(sh, 0.0, 1.0);

  float fA = clamp(cAlpha * fade * u_charOpacity * flickerVal, 0.0, 1.0);
  vec3 result = min(bg + fcc * fA * 0.8, vec3(1.0));
  gl_FragColor = vec4(result, 1.0);
}`;

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compileShader(VS, gl.VERTEX_SHADER));
gl.attachShader(prog, compileShader(FS, gl.FRAGMENT_SHADER));
gl.linkProgram(prog); gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const loc = {};
['u_image','u_charAtlas','u_resolution','u_cellSize','u_charCount',
 'u_bgDarken','u_threshold','u_blur','u_waveIntensity','u_waveScale',
 'u_density','u_edgeBoost','u_colorGrad','u_charOpacity','u_fadeRange','u_charGamma',
 'u_monoMode','u_monoBg','u_monoChar','u_time',
 'u_flickerSpeed','u_flickerIntensity','u_flickerRandom'
].forEach(n => { loc[n] = gl.getUniformLocation(prog, n); });

function createTexture(unit) {
  const tex = gl.createTexture();
  gl.activeTexture(gl.TEXTURE0 + unit);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  return tex;
}
const texImage = createTexture(0);
const texAtlas = createTexture(1);
gl.uniform1i(loc.u_image, 0);
gl.uniform1i(loc.u_charAtlas, 1);

// ============ 状态 ============
let source = null, animId = null, currentImgSrc = null;
const params = {
  cellSize: 10, charSpacing: 4, bgDarken: 0.8, threshold: 0.30, blur: 8,
  waveIntensity: 0.4, waveScale: 20, density: 0.7,
  edgeBoost: 0.3, colorGrad: 0.5, charOpacity: 0.8, fadeRange: 0.4, charGamma: 1.0,
  monoMode: 0, monoBg: [0.102, 0.153, 0.267], monoChar: [1, 1, 1],
  flickerSpeed: 0, flickerIntensity: 0.5, flickerRandom: 0.5,  // flickerSpeed=0 means off
};

let charW, charH;
function uploadCharAtlas() {
  const atlas = createCharAtlas(Math.max(8, params.cellSize));
  charW = atlas.charW; charH = atlas.charH;
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, texAtlas);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, atlas.canvas);
}
uploadCharAtlas();

let startTime = performance.now();
function render() {
  const cellW = params.cellSize + params.charSpacing;
  const cellH = params.cellSize + Math.ceil(params.cellSize * 0.4); // 垂直高度不受左右间距影响
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform2f(loc.u_resolution, canvas.width, canvas.height);
  gl.uniform2f(loc.u_cellSize, cellW, cellH);
  gl.uniform1f(loc.u_charCount, charCount);
  gl.uniform1f(loc.u_bgDarken, params.bgDarken);
  gl.uniform1f(loc.u_threshold, params.threshold);
  gl.uniform1f(loc.u_blur, params.blur);
  gl.uniform1f(loc.u_waveIntensity, params.waveIntensity);
  gl.uniform1f(loc.u_waveScale, params.waveScale);
  gl.uniform1f(loc.u_density, params.density);
  gl.uniform1f(loc.u_edgeBoost, params.edgeBoost);
  gl.uniform1f(loc.u_colorGrad, params.colorGrad);
  gl.uniform1f(loc.u_charOpacity, params.charOpacity);
  gl.uniform1f(loc.u_fadeRange, params.fadeRange);
  gl.uniform1f(loc.u_charGamma, params.charGamma);
  gl.uniform1f(loc.u_monoMode, params.monoMode);
  gl.uniform3f(loc.u_monoBg, params.monoBg[0], params.monoBg[1], params.monoBg[2]);
  gl.uniform3f(loc.u_monoChar, params.monoChar[0], params.monoChar[1], params.monoChar[2]);
  gl.uniform1f(loc.u_time, (performance.now() - startTime) / 1000);
  gl.uniform1f(loc.u_flickerSpeed, params.flickerSpeed);
  gl.uniform1f(loc.u_flickerIntensity, params.flickerIntensity);
  gl.uniform1f(loc.u_flickerRandom, params.flickerRandom);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function uploadAndRender(src) {
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, texImage);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, src);
  render();
}

// ============ 导入 ============
const fileImage = document.getElementById('fileImage');
const fileVideo = document.getElementById('fileVideo');
const video = document.getElementById('video');

document.getElementById('btnImage').onclick = () => fileImage.click();
document.getElementById('btnVideo').onclick = () => fileVideo.click();

fileImage.addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  stopVideo();
  const img = new Image();
  img.onload = () => {
    source = 'image'; currentImgSrc = img;
    canvas.width = img.width; canvas.height = img.height;
    document.getElementById('hint').style.display = 'none';
    document.getElementById('exportSection').style.display = '';
    uploadCharAtlas(); uploadAndRender(img);
    startFlickerLoop();
  };
  img.src = URL.createObjectURL(file);
});

function stopVideo() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  if (typeof flickerAnimId !== 'undefined' && flickerAnimId) { cancelAnimationFrame(flickerAnimId); flickerAnimId = null; }
  video.pause(); video.src = '';
}

fileVideo.addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  stopVideo(); source = 'video';
  video.src = URL.createObjectURL(file);
  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    document.getElementById('hint').style.display = 'none';
    document.getElementById('exportSection').style.display = '';
    uploadCharAtlas(); video.play(); videoLoop();
  };
});

function videoLoop() {
  if (source !== 'video') return;
  if (!video.paused && !video.ended) uploadAndRender(video);
  animId = requestAnimationFrame(videoLoop);
}

// ============ 自定义字符 ============
const charInput = document.getElementById('charInput');
charInput.addEventListener('input', () => {
  const val = charInput.value;
  if (val.length < 2) return; // 至少2个字符
  asciiChars = val;
  charCount = asciiChars.length;
  uploadCharAtlas();
  if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
  else if (source === 'image') render();
});

// ============ 控制面板 ============
function bindSlider(id, valId, setter) {
  const el = document.getElementById(id);
  const valEl = document.getElementById(valId);
  el.addEventListener('input', () => {
    valEl.textContent = el.value;
    setter(Number(el.value));
    if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
    else if (source === 'image') render();
  });
}

bindSlider('cellSize', 'cellSizeVal', v => { params.cellSize = v; uploadCharAtlas(); });
bindSlider('charSpacing', 'charSpacingVal', v => { params.charSpacing = v; });
bindSlider('bgDarken', 'bgDarkenVal', v => { params.bgDarken = v / 100; });
bindSlider('threshold', 'thresholdVal', v => { params.threshold = v / 500; });
bindSlider('blur', 'blurVal', v => { params.blur = v; });
bindSlider('waveIntensity', 'waveIntensityVal', v => { params.waveIntensity = v / 100; });
bindSlider('waveScale', 'waveScaleVal', v => { params.waveScale = v; });
bindSlider('density', 'densityVal', v => { params.density = v / 100; });
bindSlider('charGamma', 'charGammaVal', v => { params.charGamma = v / 100; });
bindSlider('edgeBoost', 'edgeBoostVal', v => { params.edgeBoost = v / 100; });
bindSlider('colorGrad', 'colorGradVal', v => { params.colorGrad = v / 100; });
bindSlider('charOpacity', 'charOpacityVal', v => { params.charOpacity = v / 100; });
bindSlider('fadeRange', 'fadeRangeVal', v => { params.fadeRange = v / 200; });
// ============ 闪烁开关 ============
const btnFlicker = document.getElementById('btnFlicker');
const flickerOptions = document.getElementById('flickerOptions');
let flickerEnabled = false;

btnFlicker.onclick = () => {
  flickerEnabled = !flickerEnabled;
  btnFlicker.textContent = flickerEnabled ? '关闭闪烁' : '开启闪烁';
  btnFlicker.classList.toggle('active', flickerEnabled);
  flickerOptions.style.display = flickerEnabled ? '' : 'none';
  if (flickerEnabled) {
    params.flickerSpeed = Number(document.getElementById('flickerSpeed').value) / 10;
  } else {
    params.flickerSpeed = 0;
    if (flickerAnimId) { cancelAnimationFrame(flickerAnimId); flickerAnimId = null; }
  }
  if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
  else if (source === 'image') render();
  if (flickerEnabled) startFlickerLoop();
};

bindSlider('flickerSpeed', 'flickerSpeedVal', v => { if (flickerEnabled) { params.flickerSpeed = v / 10; startFlickerLoop(); } });
bindSlider('flickerIntensity', 'flickerIntensityVal', v => { params.flickerIntensity = v / 100; });
bindSlider('flickerRandom', 'flickerRandomVal', v => { params.flickerRandom = v / 100; });

// ============ 闪烁动画循环（图片模式） ============
let flickerAnimId = null;
function startFlickerLoop() {
  if (flickerAnimId) return;
  if (params.flickerSpeed <= 0 || source !== 'image') return;
  function loop() {
    if (params.flickerSpeed <= 0 || source !== 'image') {
      flickerAnimId = null;
      return;
    }
    if (currentImgSrc) uploadAndRender(currentImgSrc);
    else render();
    flickerAnimId = requestAnimationFrame(loop);
  }
  flickerAnimId = requestAnimationFrame(loop);
}


// ============ 单色模式 ============
const btnMono = document.getElementById('btnMono');
const monoOptions = document.getElementById('monoOptions');

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  return [r, g, b];
}

btnMono.onclick = () => {
  params.monoMode = params.monoMode ? 0 : 1;
  btnMono.textContent = params.monoMode ? '关闭单色' : '单色模式';
  btnMono.classList.toggle('active', !!params.monoMode);
  monoOptions.style.display = params.monoMode ? '' : 'none';
  if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
  else if (source === 'image') render();
};

document.getElementById('monoBgColor').addEventListener('input', e => {
  params.monoBg = hexToRgb(e.target.value);
  if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
  else if (source === 'image') render();
});
document.getElementById('monoCharColor').addEventListener('input', e => {
  params.monoChar = hexToRgb(e.target.value);
  if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
  else if (source === 'image') render();
});

// ============ 导出 ============
const btnExport = document.getElementById('btnExport');
const exportProgress = document.getElementById('exportProgress');
const exportProgressBar = document.getElementById('exportProgressBar');
const durationRow = document.getElementById('exportDuration');
let isExporting = false, mediaRecorder = null, recordedChunks = [];

// 显示/隐藏时长滑块
document.querySelectorAll('input[name="exportFmt"]').forEach(r => {
  r.addEventListener('change', () => {
    const v = r.value;
    durationRow.style.display = (v === 'gif' || v === 'mp4') ? '' : 'none';
  });
});
bindSlider('recordDuration', 'recordDurationVal', () => {});

function download(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

btnExport.onclick = () => {
  const fmt = document.querySelector('input[name="exportFmt"]:checked').value;

  // 静态图片导出
  if (fmt === 'png' || fmt === 'jpg') {
    if (source === 'video') uploadAndRender(video);
    else if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
    const mime = fmt === 'png' ? 'image/png' : 'image/jpeg';
    canvas.toBlob(blob => download(blob, `ascii_render.${fmt}`), mime, 0.95);
    return;
  }

  // 动画导出 — 切换录制状态
  if (isExporting) {
    stopExport();
    return;
  }

  const duration = Number(document.getElementById('recordDuration').value);
  isExporting = true;
  btnExport.textContent = '停止录制';
  btnExport.classList.add('exporting');
  exportProgress.style.display = '';
  exportProgressBar.style.width = '0%';

  if (fmt === 'mp4') {
    // MediaRecorder 录制
    const stream = canvas.captureStream(30);
    const mimeType = MediaRecorder.isTypeSupported('video/mp4;codecs=avc1')
      ? 'video/mp4;codecs=avc1'
      : MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
        ? 'video/webm;codecs=vp9' : 'video/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8000000 });
    recordedChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
      download(new Blob(recordedChunks, { type: mimeType }), `ascii_render.${ext}`);
      resetExportUI();
    };
    mediaRecorder.start();
    animateProgress(duration, () => { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); });
  } else if (fmt === 'gif') {
    // GIF 逐帧捕获
    const fps = 15;
    const totalFrames = duration * fps;
    const interval = 1000 / fps;
    const frames = [];
    let frameCount = 0;

    function captureFrame() {
      if (!isExporting || frameCount >= totalFrames) {
        encodeGIF(frames, canvas.width, canvas.height, interval, fps);
        return;
      }
      if (source === 'video') uploadAndRender(video);
      else if (source === 'image' && currentImgSrc) uploadAndRender(currentImgSrc);
      const pixels = new Uint8Array(canvas.width * canvas.height * 4);
      gl.readPixels(0, 0, canvas.width, canvas.height, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
      frames.push(pixels);
      frameCount++;
      exportProgressBar.style.width = (frameCount / totalFrames * 50) + '%';
      setTimeout(captureFrame, interval);
    }
    captureFrame();
  }
};

function stopExport() {
  isExporting = false;
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  else resetExportUI();
}

function resetExportUI() {
  isExporting = false;
  btnExport.textContent = '导出';
  btnExport.classList.remove('exporting');
  exportProgress.style.display = 'none';
}

function animateProgress(duration, onDone) {
  const start = performance.now();
  function tick() {
    if (!isExporting) return;
    const p = Math.min((performance.now() - start) / (duration * 1000), 1);
    exportProgressBar.style.width = (p * 100) + '%';
    if (p < 1) requestAnimationFrame(tick);
    else onDone();
  }
  requestAnimationFrame(tick);
}

// ============ 简易 GIF 编码器 ============
function encodeGIF(frames, w, h, delay, fps) {
  // 缩放尺寸（GIF 太大会卡）
  const maxDim = 480;
  let sw = w, sh = h;
  if (w > maxDim || h > maxDim) {
    const ratio = Math.min(maxDim / w, maxDim / h);
    sw = Math.round(w * ratio);
    sh = Math.round(h * ratio);
  }

  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = sw;
  tempCanvas.height = sh;
  const tctx = tempCanvas.getContext('2d');

  const srcCanvas = document.createElement('canvas');
  srcCanvas.width = w;
  srcCanvas.height = h;
  const sctx = srcCanvas.getContext('2d');

  // GIF 文件头
  const out = [];
  function writeStr(s) { for (let i = 0; i < s.length; i++) out.push(s.charCodeAt(i)); }
  function writeU16(v) { out.push(v & 0xff, (v >> 8) & 0xff); }

  writeStr('GIF89a');
  writeU16(sw); writeU16(sh);
  out.push(0x70, 0, 0); // 无全局色表

  // Netscape 循环扩展
  out.push(0x21, 0xff, 0x0b);
  writeStr('NETSCAPE2.0');
  out.push(3, 1); writeU16(0); out.push(0);

  const delayCs = Math.round(1000 / fps / 10);

  for (let f = 0; f < frames.length; f++) {
    exportProgressBar.style.width = (50 + f / frames.length * 50) + '%';

    // 翻转 WebGL 像素（上下颠倒）
    const imgData = sctx.createImageData(w, h);
    const src = frames[f];
    for (let y = 0; y < h; y++) {
      const srcRow = (h - 1 - y) * w * 4;
      const dstRow = y * w * 4;
      for (let x = 0; x < w * 4; x++) imgData.data[dstRow + x] = src[srcRow + x];
    }
    sctx.putImageData(imgData, 0, 0);
    tctx.drawImage(srcCanvas, 0, 0, sw, sh);
    const scaled = tctx.getImageData(0, 0, sw, sh).data;

    // 量化为 256 色（中位切分简化版：取前 256 个不同颜色）
    const palette = [];
    const colorMap = new Map();
    const indexed = new Uint8Array(sw * sh);

    for (let i = 0; i < sw * sh; i++) {
      const r = scaled[i*4] >> 2, g = scaled[i*4+1] >> 2, b = scaled[i*4+2] >> 2;
      const key = (r << 12) | (g << 6) | b;
      if (!colorMap.has(key) && palette.length < 256) {
        colorMap.set(key, palette.length);
        palette.push([scaled[i*4], scaled[i*4+1], scaled[i*4+2]]);
      }
      if (colorMap.has(key)) {
        indexed[i] = colorMap.get(key);
      } else {
        // 找最近颜色
        let best = 0, bestD = Infinity;
        const sr = scaled[i*4], sg = scaled[i*4+1], sb = scaled[i*4+2];
        for (let j = 0; j < palette.length; j++) {
          const dr = sr - palette[j][0], dg = sg - palette[j][1], db = sb - palette[j][2];
          const d = dr*dr + dg*dg + db*db;
          if (d < bestD) { bestD = d; best = j; }
        }
        indexed[i] = best;
      }
    }

    // 补齐到 2 的幂
    let palSize = 2;
    while (palSize < palette.length) palSize *= 2;
    while (palette.length < palSize) palette.push([0,0,0]);
    const bits = Math.log2(palSize);

    // 图形控制扩展
    out.push(0x21, 0xf9, 4, 0);
    writeU16(delayCs);
    out.push(0, 0);

    // 图像描述符
    out.push(0x2c);
    writeU16(0); writeU16(0); writeU16(sw); writeU16(sh);
    out.push(0x80 | (bits - 1)); // 本地色表

    // 本地色表
    for (let c = 0; c < palSize; c++) {
      out.push(palette[c][0], palette[c][1], palette[c][2]);
    }

    // LZW 压缩
    const minCode = Math.max(bits, 2);
    lzwEncode(out, indexed, minCode);
  }

  out.push(0x3b); // 结束
  resetExportUI();
  download(new Blob([new Uint8Array(out)], { type: 'image/gif' }), 'ascii_render.gif');
}

function lzwEncode(out, data, minCode) {
  const clearCode = 1 << minCode;
  const eoiCode = clearCode + 1;
  let codeSize = minCode + 1;
  let nextCode = eoiCode + 1;
  const table = new Map();
  const buffer = [];
  let bits = 0, buf = 0;

  function emit(code) {
    buf |= code << bits;
    bits += codeSize;
    while (bits >= 8) { buffer.push(buf & 0xff); buf >>= 8; bits -= 8; }
  }

  function initTable() {
    table.clear();
    for (let i = 0; i < clearCode; i++) table.set(String(i), i);
    nextCode = eoiCode + 1;
    codeSize = minCode + 1;
  }

  out.push(minCode);
  initTable();
  emit(clearCode);

  let prefix = String(data[0]);
  for (let i = 1; i < data.length; i++) {
    const c = String(data[i]);
    const key = prefix + ',' + c;
    if (table.has(key)) {
      prefix = key;
    } else {
      emit(table.get(prefix));
      if (nextCode < 4096) {
        table.set(key, nextCode++);
        if (nextCode > (1 << codeSize) && codeSize < 12) codeSize++;
      } else {
        emit(clearCode);
        initTable();
      }
      prefix = c;
    }
  }
  emit(table.get(prefix));
  emit(eoiCode);
  if (bits > 0) buffer.push(buf & 0xff);

  // 输出子块
  let pos = 0;
  while (pos < buffer.length) {
    const chunk = Math.min(255, buffer.length - pos);
    out.push(chunk);
    for (let i = 0; i < chunk; i++) out.push(buffer[pos++]);
  }
  out.push(0); // 块终止
}
