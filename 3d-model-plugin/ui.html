<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #09090b;
  color: #a1a1aa;
  font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* 滚动条 */
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }
.panel::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

/* 左侧控制面板 */
.panel {
  width: 260px;
  min-width: 260px;
  background: #0c0c0f;
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 16px 14px;
  gap: 4px;
}
.panel-title {
  font-size: 11px;
  font-weight: 600;
  color: #52525b;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 16px 0 6px;
  padding: 0 2px;
}
.panel-title:first-child { margin-top: 0; }
.panel .row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 4px 2px;
  border-radius: 6px;
  transition: background 0.15s;
}
.panel .row:hover { background: rgba(255,255,255,0.02); }
.panel .row label {
  font-size: 11px;
  font-weight: 400;
  color: #71717a;
  white-space: nowrap;
  min-width: 56px;
}
.panel .row input[type="range"] {
  flex: 1;
  min-width: 0;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: #27272a;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
.panel .row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #e4e4e7;
  border: 2px solid #18181b;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
  cursor: pointer;
  transition: transform 0.1s;
}
.panel .row input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
.panel .row .val {
  font-size: 10px;
  font-weight: 500;
  color: #52525b;
  min-width: 28px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.btn {
  padding: 7px 0;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: #d4d4d8;
  border-radius: 8px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  transition: all 0.2s ease;
  text-align: center;
  width: 100%;
  letter-spacing: 0.01em;
}
.btn:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.12);
  color: #fafafa;
}
.btn:active { transform: scale(0.98); }
.btn-group { display: flex; gap: 6px; }
.btn-group .btn { flex: 1; }

.btn.active {
  background: rgba(74, 222, 128, 0.08);
  border-color: rgba(74, 222, 128, 0.25);
  color: #4ade80;
}
.btn.active:hover { background: rgba(74, 222, 128, 0.12); }

.btn.primary {
  background: rgba(99, 102, 241, 0.1);
  border-color: rgba(99, 102, 241, 0.25);
  color: #818cf8;
}
.btn.primary:hover {
  background: rgba(99, 102, 241, 0.15);
  border-color: rgba(99, 102, 241, 0.35);
  color: #a5b4fc;
}

.btn.export-btn {
  background: rgba(251, 146, 60, 0.1);
  border-color: rgba(251, 146, 60, 0.25);
  color: #fb923c;
}
.btn.export-btn:hover {
  background: rgba(251, 146, 60, 0.15);
  border-color: rgba(251, 146, 60, 0.35);
  color: #fdba74;
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  margin: 10px 0;
}

.color-swatch {
  width: 24px;
  height: 24px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  cursor: pointer;
  padding: 0;
  overflow: hidden;
}
.color-swatch::-webkit-color-swatch-wrapper { padding: 0; }
.color-swatch::-webkit-color-swatch { border: none; border-radius: 4px; }

/* 右侧画布区 */
.canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #09090b;
  position: relative;
  overflow: hidden;
}
#threeCanvas {
  width: 100%;
  height: 100%;
  display: block;
}
.hint {
  color: #3f3f46;
  font-size: 12px;
  font-weight: 400;
  position: absolute;
  letter-spacing: 0.05em;
  text-align: center;
  line-height: 1.6;
  pointer-events: none;
}

/* 进度条 */
.progress-bar {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(12, 12, 15, 0.9);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 11px;
  color: #a1a1aa;
  display: none;
  align-items: center;
  gap: 10px;
  backdrop-filter: blur(8px);
  z-index: 10;
}
.progress-bar .bar-track {
  width: 120px;
  height: 3px;
  background: #27272a;
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar .bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #818cf8, #a78bfa);
  border-radius: 2px;
  transition: width 0.2s;
}

/* 模型信息 */
.model-info {
  font-size: 9px;
  color: #3f3f46;
  padding: 2px;
  margin-top: 2px;
  line-height: 1.4;
}

/* 预设按钮 */
.preset-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}
.preset-grid .btn { font-size: 10px; padding: 5px 0; }

/* GIF 设置 */
.gif-settings { margin-top: 6px; }

select.select-input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  color: #d4d4d8;
  font-family: inherit;
  font-size: 11px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  outline: none;
  -webkit-appearance: none;
}
select.select-input:focus { border-color: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<!-- 左侧面板 -->
<div class="panel">
  <div class="panel-title">导入模型</div>
  <button class="btn primary" id="btnImport">选择 3D 模型文件</button>
  <div class="model-info" id="modelInfo">支持 GLB / GLTF / OBJ / STL / FBX</div>

  <div id="controlsSection" style="display:none;">
    <div class="divider"></div>

    <div class="panel-title">旋转</div>
    <div class="row">
      <label>X 轴</label>
      <input type="range" id="rotX" min="0" max="360" value="0">
      <span class="val" id="rotXVal">0°</span>
    </div>
    <div class="row">
      <label>Y 轴</label>
      <input type="range" id="rotY" min="0" max="360" value="0">
      <span class="val" id="rotYVal">0°</span>
    </div>
    <div class="row">
      <label>Z 轴</label>
      <input type="range" id="rotZ" min="0" max="360" value="0">
      <span class="val" id="rotZVal">0°</span>
    </div>
    <button class="btn" id="btnAutoRotate">自动旋转</button>
    <div id="autoRotateOptions" style="display:none;">
      <div class="row" style="margin-top:4px;">
        <label>速度</label>
        <input type="range" id="autoRotateSpeed" min="1" max="100" value="30">
        <span class="val" id="autoRotateSpeedVal">30</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="panel-title">缩放</div>
    <div class="row">
      <label>大小</label>
      <input type="range" id="modelScale" min="10" max="300" value="100">
      <span class="val" id="modelScaleVal">100%</span>
    </div>

    <div class="divider"></div>

    <div class="panel-title">光照</div>
    <div class="row">
      <label>环境光</label>
      <input type="range" id="ambientIntensity" min="0" max="200" value="60">
      <span class="val" id="ambientIntensityVal">60</span>
    </div>
    <div class="row">
      <label>主灯</label>
      <input type="range" id="dirIntensity" min="0" max="300" value="120">
      <span class="val" id="dirIntensityVal">120</span>
    </div>
    <div class="row">
      <label>灯光角度</label>
      <input type="range" id="lightAngle" min="0" max="360" value="45">
      <span class="val" id="lightAngleVal">45°</span>
    </div>
    <div class="row">
      <label>灯光颜色</label>
      <input type="color" id="lightColor" value="#ffffff" class="color-swatch">
    </div>

    <div class="divider"></div>

    <div class="panel-title">材质</div>
    <button class="btn" id="btnWireframe">线框模式</button>
    <div class="row" style="margin-top:4px;">
      <label>金属度</label>
      <input type="range" id="metalness" min="0" max="100" value="0">
      <span class="val" id="metalnessVal">0</span>
    </div>
    <div class="row">
      <label>粗糙度</label>
      <input type="range" id="roughness" min="0" max="100" value="70">
      <span class="val" id="roughnessVal">70</span>
    </div>
    <div class="row">
      <label>模型颜色</label>
      <input type="color" id="modelColor" value="#aaaaaa" class="color-swatch">
    </div>

    <div class="divider"></div>

    <div class="panel-title">背景</div>
    <div class="row">
      <label>背景色</label>
      <input type="color" id="bgColor" value="#09090b" class="color-swatch">
    </div>
    <button class="btn" id="btnTransparent">透明背景</button>

    <div class="divider"></div>

    <div class="panel-title">视角预设</div>
    <div class="preset-grid">
      <button class="btn" data-view="front">正面</button>
      <button class="btn" data-view="back">背面</button>
      <button class="btn" data-view="left">左侧</button>
      <button class="btn" data-view="right">右侧</button>
      <button class="btn" data-view="top">顶部</button>
      <button class="btn" data-view="iso">等距</button>
    </div>

    <div class="divider"></div>

    <div class="panel-title">导出</div>
    <div class="row">
      <label>分辨率</label>
      <select class="select-input" id="exportRes">
        <option value="1">1x (原始)</option>
        <option value="2" selected>2x (高清)</option>
        <option value="4">4x (超清)</option>
      </select>
    </div>
    <button class="btn primary" id="btnExportPNG" style="margin-top:6px;">导出 PNG</button>
    <button class="btn export-btn" id="btnExportGIF" style="margin-top:4px;">导出 GIF 动画</button>
    <div class="gif-settings">
      <div class="row">
        <label>帧数</label>
        <input type="range" id="gifFrames" min="8" max="72" value="36" step="4">
        <span class="val" id="gifFramesVal">36</span>
      </div>
      <div class="row">
        <label>帧延迟</label>
        <input type="range" id="gifDelay" min="20" max="200" value="50" step="10">
        <span class="val" id="gifDelayVal">50ms</span>
      </div>
      <div class="row">
        <label>旋转轴</label>
        <select class="select-input" id="gifAxis">
          <option value="y">Y 轴</option>
          <option value="x">X 轴</option>
          <option value="z">Z 轴</option>
        </select>
      </div>
    </div>
    <button class="btn primary" id="btnInsertFigma" style="margin-top:8px;">插入到 Figma</button>
  </div>
</div>

<!-- 右侧画布 -->
<div class="canvas-area" id="canvasArea">
  <canvas id="threeCanvas"></canvas>
  <p class="hint" id="hint">导入 3D 模型文件开始<br>支持 GLB / GLTF / OBJ / STL / FBX</p>
  <div class="progress-bar" id="progressBar">
    <span id="progressText">导出中...</span>
    <div class="bar-track"><div class="bar-fill" id="progressFill"></div></div>
  </div>
</div>

<input type="file" id="fileInput" accept=".glb,.gltf,.obj,.stl,.fbx" hidden>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

// ============ 状态 ============
let scene, camera, renderer, controls;
let currentModel = null;
let autoRotate = false;
let wireframe = false;
let transparentBg = false;
let modelMaterials = [];

// ============ 初始化 Three.js ============
function init() {
  const canvas = document.getElementById('threeCanvas');
  const area = document.getElementById('canvasArea');

  scene = new THREE.Scene();
  scene.background = new THREE.Color('#09090b');

  camera = new THREE.PerspectiveCamera(45, area.clientWidth / area.clientHeight, 0.01, 1000);
  camera.position.set(3, 2, 5);

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    preserveDrawingBuffer: true,
    alpha: true
  });
  renderer.setSize(area.clientWidth, area.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // 灯光
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  ambientLight.name = 'ambient';
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.name = 'directional';
  dirLight.position.set(5, 8, 5);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  scene.add(dirLight);

  // 补光
  const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
  fillLight.position.set(-3, 2, -3);
  scene.add(fillLight);

  // 地面反射光
  const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.3);
  scene.add(hemiLight);

  // 网格辅助线
  const grid = new THREE.GridHelper(10, 20, 0x222222, 0x111111);
  grid.name = 'grid';
  scene.add(grid);

  // 轨道控制
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = true;
  controls.minDistance = 0.5;
  controls.maxDistance = 50;

  // 窗口大小变化
  const resizeObserver = new ResizeObserver(() => {
    const w = area.clientWidth;
    const h = area.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
  resizeObserver.observe(area);

  animate();
}

function animate() {
  requestAnimationFrame(animate);

  if (autoRotate && currentModel) {
    const speed = parseFloat(document.getElementById('autoRotateSpeed').value) / 1000;
    currentModel.rotation.y += speed;
    // 同步滑块
    const deg = ((currentModel.rotation.y * 180 / Math.PI) % 360 + 360) % 360;
    document.getElementById('rotY').value = Math.round(deg);
    document.getElementById('rotYVal').textContent = Math.round(deg) + '°';
  }

  controls.update();
  renderer.render(scene, camera);
}

// ============ 加载模型 ============
function loadModel(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const url = URL.createObjectURL(file);

  // 清除旧模型
  if (currentModel) {
    scene.remove(currentModel);
    currentModel = null;
    modelMaterials = [];
  }

  document.getElementById('hint').style.display = 'none';
  document.getElementById('modelInfo').textContent = `加载中: ${file.name}...`;

  const onLoad = (object) => {
    let model;
    if (object.scene) {
      model = object.scene; // GLTF
    } else if (object.isBufferGeometry) {
      // STL
      const material = new THREE.MeshStandardMaterial({
        color: document.getElementById('modelColor').value,
        metalness: parseFloat(document.getElementById('metalness').value) / 100,
        roughness: parseFloat(document.getElementById('roughness').value) / 100
      });
      model = new THREE.Mesh(object, material);
    } else {
      model = object; // OBJ / FBX
    }

    // 居中并缩放
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 3 / maxDim;
    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));

    // 收集材质
    modelMaterials = [];
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        if (child.material) {
          if (Array.isArray(child.material)) {
            modelMaterials.push(...child.material);
          } else {
            modelMaterials.push(child.material);
          }
        }
        // 如果没有材质颜色（如 OBJ 无 MTL），赋默认材质
        if (!child.material || (child.material.color && child.material.color.getHexString() === '000000' && ext === 'obj')) {
          child.material = new THREE.MeshStandardMaterial({
            color: document.getElementById('modelColor').value,
            metalness: parseFloat(document.getElementById('metalness').value) / 100,
            roughness: parseFloat(document.getElementById('roughness').value) / 100
          });
          modelMaterials.push(child.material);
        }
      }
    });

    currentModel = model;
    scene.add(model);

    // 调整相机
    const dist = maxDim * scale * 2.5;
    camera.position.set(dist * 0.7, dist * 0.5, dist * 0.7);
    controls.target.set(0, 0, 0);
    controls.update();

    // 显示控制面板
    document.getElementById('controlsSection').style.display = 'block';

    // 统计信息
    let vertexCount = 0, faceCount = 0;
    model.traverse((child) => {
      if (child.isMesh && child.geometry) {
        const geo = child.geometry;
        vertexCount += geo.attributes.position ? geo.attributes.position.count : 0;
        faceCount += geo.index ? geo.index.count / 3 : (geo.attributes.position ? geo.attributes.position.count / 3 : 0);
      }
    });
    document.getElementById('modelInfo').textContent =
      `${file.name} | ${(vertexCount/1000).toFixed(1)}k 顶点 | ${(faceCount/1000).toFixed(1)}k 面`;

    // 重置旋转滑块
    document.getElementById('rotX').value = 0;
    document.getElementById('rotY').value = 0;
    document.getElementById('rotZ').value = 0;
    document.getElementById('rotXVal').textContent = '0°';
    document.getElementById('rotYVal').textContent = '0°';
    document.getElementById('rotZVal').textContent = '0°';
    document.getElementById('modelScale').value = 100;
    document.getElementById('modelScaleVal').textContent = '100%';

    URL.revokeObjectURL(url);
  };

  const onError = (err) => {
    console.error('Model load error:', err);
    document.getElementById('modelInfo').textContent = `加载失败: ${err.message || '未知错误'}`;
    document.getElementById('hint').style.display = 'block';
    document.getElementById('hint').textContent = '模型加载失败，请尝试其他文件';
    URL.revokeObjectURL(url);
  };

  switch (ext) {
    case 'glb':
    case 'gltf':
      new GLTFLoader().load(url, onLoad, undefined, onError);
      break;
    case 'obj':
      new OBJLoader().load(url, onLoad, undefined, onError);
      break;
    case 'stl':
      new STLLoader().load(url, (geometry) => onLoad(geometry), undefined, onError);
      break;
    case 'fbx':
      new FBXLoader().load(url, onLoad, undefined, onError);
      break;
    default:
      document.getElementById('modelInfo').textContent = '不支持的文件格式';
  }
}

// ============ 导出 PNG ============
function exportPNG() {
  if (!currentModel) return;

  const scale = parseInt(document.getElementById('exportRes').value);
  const area = document.getElementById('canvasArea');
  const w = area.clientWidth * scale;
  const h = area.clientHeight * scale;

  // 临时高分辨率渲染
  renderer.setSize(w, h);
  renderer.setPixelRatio(1);

  if (transparentBg) {
    scene.background = null;
    const grid = scene.getObjectByName('grid');
    if (grid) grid.visible = false;
  }

  renderer.render(scene, camera);

  const dataUrl = renderer.domElement.toDataURL('image/png');

  // 恢复
  renderer.setSize(area.clientWidth, area.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  if (transparentBg) {
    const grid = scene.getObjectByName('grid');
    if (grid) grid.visible = true;
  } else {
    scene.background = new THREE.Color(document.getElementById('bgColor').value);
  }

  // 下载
  const link = document.createElement('a');
  link.download = '3d-render.png';
  link.href = dataUrl;
  link.click();
}

// ============ 导出 GIF ============
async function exportGIF() {
  if (!currentModel) return;

  const frameCount = parseInt(document.getElementById('gifFrames').value);
  const delay = parseInt(document.getElementById('gifDelay').value);
  const axis = document.getElementById('gifAxis').value;
  const scale = parseInt(document.getElementById('exportRes').value);
  const area = document.getElementById('canvasArea');
  const w = area.clientWidth * scale;
  const h = area.clientHeight * scale;

  // 显示进度
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  const progressFill = document.getElementById('progressFill');
  progressBar.style.display = 'flex';
  progressText.textContent = '正在生成 GIF...';
  progressFill.style.width = '0%';

  // 保存当前旋转
  const savedRot = {
    x: currentModel.rotation.x,
    y: currentModel.rotation.y,
    z: currentModel.rotation.z
  };
  const savedAutoRotate = autoRotate;
  autoRotate = false;

  // 临时高分辨率
  renderer.setSize(w, h);
  renderer.setPixelRatio(1);

  if (transparentBg) {
    scene.background = null;
    const grid = scene.getObjectByName('grid');
    if (grid) grid.visible = false;
  }

  // 收集帧
  const frames = [];
  const angleStep = (Math.PI * 2) / frameCount;

  for (let i = 0; i < frameCount; i++) {
    const angle = i * angleStep;

    currentModel.rotation.x = savedRot.x + (axis === 'x' ? angle : 0);
    currentModel.rotation.y = savedRot.y + (axis === 'y' ? angle : 0);
    currentModel.rotation.z = savedRot.z + (axis === 'z' ? angle : 0);

    renderer.render(scene, camera);

    // canvas 转 blob
    const blob = await new Promise(resolve => renderer.domElement.toBlob(resolve, 'image/png'));
    const arrayBuffer = await blob.arrayBuffer();
    frames.push(new Uint8Array(arrayBuffer));

    const progress = ((i + 1) / frameCount * 50);
    progressFill.style.width = progress + '%';
    progressText.textContent = `渲染帧 ${i + 1}/${frameCount}`;

    // 让 UI 更新
    await new Promise(r => setTimeout(r, 10));
  }

  // 恢复
  currentModel.rotation.x = savedRot.x;
  currentModel.rotation.y = savedRot.y;
  currentModel.rotation.z = savedRot.z;
  autoRotate = savedAutoRotate;
  renderer.setSize(area.clientWidth, area.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  if (transparentBg) {
    const grid = scene.getObjectByName('grid');
    if (grid) grid.visible = true;
  } else {
    scene.background = new THREE.Color(document.getElementById('bgColor').value);
  }

  progressText.textContent = '正在编码 GIF...';
  progressFill.style.width = '60%';

  // 用 canvas 手动编码 GIF（使用简单的逐帧 PNG 方式创建动画 —— 这里用一个轻量 GIF 编码器）
  await encodeGIF(frames, w, h, delay, progressFill, progressText, progressBar);
}

// 简单 GIF 编码器（基于 LZW 的最小实现）
async function encodeGIF(pngFrames, width, height, delay, progressFill, progressText, progressBar) {
  // 创建临时 canvas 解码 PNG 帧
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = width;
  tempCanvas.height = height;
  const ctx = tempCanvas.getContext('2d');

  // 解码所有帧为 ImageData
  const imageDataList = [];
  for (let i = 0; i < pngFrames.length; i++) {
    const blob = new Blob([pngFrames[i]], { type: 'image/png' });
    const bitmap = await createImageBitmap(blob);
    ctx.clearRect(0, 0, width, height);
    ctx.drawImage(bitmap, 0, 0);
    const imageData = ctx.getImageData(0, 0, width, height);
    imageDataList.push(imageData);
    bitmap.close();
    progressFill.style.width = (60 + (i / pngFrames.length) * 10) + '%';
  }

  progressText.textContent = '量化颜色...';

  // 量化 + GIF 编码
  const gif = new GIFEncoder(width, height);
  gif.writeHeader();

  for (let i = 0; i < imageDataList.length; i++) {
    const pixels = imageDataList[i].data;
    // 中值切割量化到 256 色
    const { palette, indexedPixels } = quantize(pixels, width * height);

    gif.writeGraphicControlExt(delay / 10); // delay in 1/100s
    gif.writeImageDesc(0, 0, width, height, i === 0, palette.length / 3);
    if (i === 0) {
      gif.writeColorTable(palette);
    }
    gif.writeLZW(indexedPixels, Math.max(2, Math.ceil(Math.log2(palette.length / 3))));

    progressFill.style.width = (70 + (i / imageDataList.length) * 25) + '%';
    progressText.textContent = `编码帧 ${i + 1}/${imageDataList.length}`;
    await new Promise(r => setTimeout(r, 5));
  }

  gif.writeTrailer();

  // 下载
  const blob = new Blob([gif.getBuffer()], { type: 'image/gif' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = '3d-render.gif';
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);

  progressFill.style.width = '100%';
  progressText.textContent = 'GIF 导出完成!';
  setTimeout(() => { progressBar.style.display = 'none'; }, 2000);
}

// ============ 极简 GIF 编码器 ============
class GIFEncoder {
  constructor(w, h) {
    this.width = w;
    this.height = h;
    this.data = [];
  }

  writeByte(b) { this.data.push(b & 0xFF); }
  writeBytes(arr) { for (const b of arr) this.data.push(b & 0xFF); }
  writeShort(v) { this.writeByte(v & 0xFF); this.writeByte((v >> 8) & 0xFF); }

  writeHeader() {
    // GIF89a
    this.writeBytes([0x47, 0x49, 0x46, 0x38, 0x39, 0x61]);
    // Logical Screen Descriptor
    this.writeShort(this.width);
    this.writeShort(this.height);
    this.writeByte(0xF7); // GCT flag, 256 colors (2^(7+1))
    this.writeByte(0); // bg color index
    this.writeByte(0); // pixel aspect ratio
    // 全局颜色表（先写256个黑色，后面每帧用局部颜色表）
    for (let i = 0; i < 256 * 3; i++) this.writeByte(0);
    // Application Extension for looping
    this.writeBytes([0x21, 0xFF, 0x0B]);
    // NETSCAPE2.0
    this.writeBytes([0x4E, 0x45, 0x54, 0x53, 0x43, 0x41, 0x50, 0x45, 0x32, 0x2E, 0x30]);
    this.writeBytes([0x03, 0x01, 0x00, 0x00, 0x00]); // loop forever
  }

  writeGraphicControlExt(delay) {
    this.writeBytes([0x21, 0xF9, 0x04]);
    this.writeByte(0x00); // no disposal, no transparency
    this.writeShort(delay); // delay
    this.writeByte(0); // transparent color index
    this.writeByte(0); // terminator
  }

  writeImageDesc(x, y, w, h, hasLocalTable, numColors) {
    this.writeByte(0x2C);
    this.writeShort(x);
    this.writeShort(y);
    this.writeShort(w);
    this.writeShort(h);
    if (hasLocalTable) {
      this.writeByte(0x87); // local color table, 256 entries
    } else {
      this.writeByte(0x87); // always use local color table for each frame
    }
  }

  writeColorTable(palette) {
    for (let i = 0; i < palette.length; i++) {
      this.writeByte(palette[i]);
    }
    // 填充到 256 色
    const remaining = 256 * 3 - palette.length;
    for (let i = 0; i < remaining; i++) this.writeByte(0);
  }

  writeLZW(indexedPixels, minCodeSize) {
    minCodeSize = Math.max(2, Math.min(minCodeSize, 8));
    this.writeByte(minCodeSize);

    const clearCode = 1 << minCodeSize;
    const eoiCode = clearCode + 1;
    let codeSize = minCodeSize + 1;
    let nextCode = eoiCode + 1;
    const maxTableSize = 4096;

    let buffer = [];
    let currentBits = 0;
    let currentByte = 0;
    let bitPos = 0;

    const outputCode = (code) => {
      currentByte |= (code << bitPos);
      bitPos += codeSize;
      while (bitPos >= 8) {
        buffer.push(currentByte & 0xFF);
        currentByte >>= 8;
        bitPos -= 8;
      }
    };

    const flushBuffer = () => {
      if (bitPos > 0) buffer.push(currentByte & 0xFF);
      // 写子块
      let pos = 0;
      while (pos < buffer.length) {
        const chunkSize = Math.min(255, buffer.length - pos);
        this.writeByte(chunkSize);
        for (let i = 0; i < chunkSize; i++) {
          this.writeByte(buffer[pos + i]);
        }
        pos += chunkSize;
      }
      this.writeByte(0); // block terminator
    };

    // LZW 编码
    outputCode(clearCode);

    // 使用 Map 作为字典
    let table = new Map();
    for (let i = 0; i < clearCode; i++) {
      table.set(String(i), i);
    }

    let prefix = String(indexedPixels[0]);
    for (let i = 1; i < indexedPixels.length; i++) {
      const c = String(indexedPixels[i]);
      const key = prefix + ',' + c;
      if (table.has(key)) {
        prefix = key;
      } else {
        outputCode(table.get(prefix));
        if (nextCode < maxTableSize) {
          table.set(key, nextCode++);
          if (nextCode > (1 << codeSize) && codeSize < 12) {
            codeSize++;
          }
        } else {
          // table full, emit clear
          outputCode(clearCode);
          table = new Map();
          for (let j = 0; j < clearCode; j++) {
            table.set(String(j), j);
          }
          nextCode = eoiCode + 1;
          codeSize = minCodeSize + 1;
        }
        prefix = c;
      }
    }
    outputCode(table.get(prefix));
    outputCode(eoiCode);
    flushBuffer();
  }

  writeTrailer() {
    this.writeByte(0x3B);
  }

  getBuffer() {
    return new Uint8Array(this.data);
  }
}

// ============ 颜色量化（中值切割简化版）============
function quantize(rgba, pixelCount) {
  // 采样像素（性能优化）
  const sampleStep = Math.max(1, Math.floor(pixelCount / 10000));
  const samples = [];
  for (let i = 0; i < pixelCount; i += sampleStep) {
    const idx = i * 4;
    samples.push([rgba[idx], rgba[idx + 1], rgba[idx + 2]]);
  }

  // 中值切割
  const palette = medianCut(samples, 256);

  // 映射每个像素到最近的调色板颜色
  const indexedPixels = new Uint8Array(pixelCount);
  // 构建简单查找缓存
  const cache = new Map();

  for (let i = 0; i < pixelCount; i++) {
    const idx = i * 4;
    const r = rgba[idx], g = rgba[idx + 1], b = rgba[idx + 2];
    // 量化到 5 bit 作为缓存 key
    const key = ((r >> 3) << 10) | ((g >> 3) << 5) | (b >> 3);

    if (cache.has(key)) {
      indexedPixels[i] = cache.get(key);
    } else {
      let minDist = Infinity, bestIdx = 0;
      for (let j = 0; j < palette.length; j += 3) {
        const dr = r - palette[j], dg = g - palette[j + 1], db = b - palette[j + 2];
        const dist = dr * dr + dg * dg + db * db;
        if (dist < minDist) {
          minDist = dist;
          bestIdx = j / 3;
        }
      }
      cache.set(key, bestIdx);
      indexedPixels[i] = bestIdx;
    }
  }

  return { palette, indexedPixels };
}

function medianCut(pixels, maxColors) {
  if (pixels.length === 0) {
    const palette = new Uint8Array(maxColors * 3);
    return palette;
  }

  let boxes = [pixels];

  while (boxes.length < maxColors) {
    // 找最大范围的 box
    let maxRange = -1, maxIdx = -1, splitChannel = 0;
    for (let i = 0; i < boxes.length; i++) {
      const box = boxes[i];
      if (box.length <= 1) continue;
      for (let c = 0; c < 3; c++) {
        let lo = 255, hi = 0;
        for (const px of box) {
          if (px[c] < lo) lo = px[c];
          if (px[c] > hi) hi = px[c];
        }
        const range = hi - lo;
        if (range > maxRange) {
          maxRange = range;
          maxIdx = i;
          splitChannel = c;
        }
      }
    }
    if (maxIdx === -1) break;

    const box = boxes[maxIdx];
    box.sort((a, b) => a[splitChannel] - b[splitChannel]);
    const mid = Math.floor(box.length / 2);
    boxes.splice(maxIdx, 1, box.slice(0, mid), box.slice(mid));
  }

  // 每个 box 取平均色
  const palette = new Uint8Array(Math.min(boxes.length, maxColors) * 3);
  for (let i = 0; i < Math.min(boxes.length, maxColors); i++) {
    const box = boxes[i];
    let r = 0, g = 0, b = 0;
    for (const px of box) {
      r += px[0]; g += px[1]; b += px[2];
    }
    palette[i * 3] = Math.round(r / box.length);
    palette[i * 3 + 1] = Math.round(g / box.length);
    palette[i * 3 + 2] = Math.round(b / box.length);
  }
  return palette;
}

// 缩放
const scaleSlider = document.getElementById('modelScale');
scaleSlider.addEventListener('input', () => {
  document.getElementById('modelScaleVal').textContent = scaleSlider.value + '%';
  if (currentModel) {
    const s = parseFloat(scaleSlider.value) / 100;
    // 重新计算基础缩放
    const box = new THREE.Box3().setFromObject(currentModel);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const baseScale = currentModel.scale.x; // 当前的基础缩放
    currentModel.scale.setScalar(baseScale * s / (parseFloat(scaleSlider._lastValue || 100) / 100));
    scaleSlider._lastValue = scaleSlider.value;
  }
});

    const dist = 5;
    const views = {
      front: [0, 0, dist],
      back: [0, 0, -dist],
      left: [-dist, 0, 0],

// 插入到 Figma
document.getElementById('btnInsertFigma').addEventListener('click', () => {
  if (!currentModel) return;

  const scale = parseInt(document.getElementById('exportRes').value);
  const area = document.getElementById('canvasArea');
  const w = area.clientWidth * scale;
  const h = area.clientHeight * scale;

  renderer.setSize(w, h);
  renderer.setPixelRatio(1);

  if (transparentBg) {
    scene.background = null;
    const grid = scene.getObjectByName('grid');
    if (grid) grid.visible = false;
  }

  renderer.render(scene, camera);

  renderer.domElement.toBlob((blob) => {
    blob.arrayBuffer().then(buf => {
      parent.postMessage({
        pluginMessage: {
          type: 'insert-to-figma',
          bytes: Array.from(new Uint8Array(buf)),
          width: w,
          height: h,
          name: '3D Render'
        }
      }, '*');
    });

    // 恢复
    renderer.setSize(area.clientWidth, area.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    if (!transparentBg) {
      scene.background = new THREE.Color(document.getElementById('bgColor').value);
    }
    const grid = scene.getObjectByName('grid');
    if (grid) grid.visible = !transparentBg;
  }, 'image/png');
});

  // 无需额外操作
